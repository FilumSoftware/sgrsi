<!DOCTYPE html>
<html lang="es">
<!-- cambiando ubicacion del index esta linea es una excusa para simular un cambio en el archivo y hacer un push-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGRSI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="FrontEnd/css/main.css">
    <link rel="stylesheet" href="FrontEnd/css/login.css">
</head>

<body>
    <div class="pagina">

        <div class="login-box">

            <img src="FrontEnd/img/logo.png" alt="Filum Software" class="logo">

            <h2>SGRSI</h2>
            <p class="subtitulo">Ingresá tus datos para acceder al sistema</p>

            <form id="form-login" action="paginas/dashboard/dashboard.html" method="get">
                <label>C.i</label>
                <input type="text" id="ci" placeholder="5789043">
                <p class="error-mensaje" id="error-ci"></p>

                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••">
                <p class="error-mensaje" id="error-password"></p>

                <button type="submit" class="btn-ingresar">Iniciar sesión</button>
            </form>

        </div>

        <p class="pie">SGRSI v2.0 — FILUM SOFTWARE © 2026</p>

    </div>
    <script src="js/login.js"></script>
</body>


</html>
