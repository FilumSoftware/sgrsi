<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="mesa-de-ayuda.css">
    <title>Mesa de Ayuda</title>
</head>

<body>
    <div class="container">

        <nav class="sidebar">
            <ul>
                <li class="sidebar-item"><a href="../dashboard/dashboard.html">Dashboard</a></li>
                <li class="sidebar-item"><a href="../uso-sala/planilla-uso-sala.html">Sala de informatica</a></li>
                <li class="sidebar-item"><a href="../inventario/nuevo-equipo.html">Inventario</a></li>
                <li class="sidebar-item activo">Mesa de Ayuda</li>
                <li class="sidebar-item"><a href="../solicitudes/nueva-solicitud.html">Solicitudes</a></li>
                <li class="sidebar-item"><a href="../usuarios/nuevo-usuario.html">Usuarios</a></li>
                <li class="sidebar-item"><a href="../../../index.html" class="btn-salir">Cerrar sesión</a></li>
            </ul>
        </nav>

        <main class="main">

            <nav class="topbar-nav">
                <ul>
                    <li class="topbar-item"><a href="mesa-de-ayuda.html">Historial de tickets</a></li>
                    <li class="topbar-item activo">Nuevo ticket</li>
                </ul>
                <div class="topbar-logo">
                    <img src="../../img/logo.png" alt="Logo SGRSI">
                    <span>SGRSI</span>
                </div>
            </nav>

            <div class="form-container">
                <h1>EDICIÓN DE TICKET</h1>
                <form id="form-detalle-ticket" action="" method="post">
                    <div class="form-grupo">
                        <label for="fecha">Fecha</label>
                        <input type="date" id="fecha" name="fecha" readonly>
                    </div>
                    <div class="form-grupo">
                        <label for="hora">Hora</label>
                        <input type="time" id="hora" name="hora" readonly>
                    </div>
                    <div class="form-grupo">
                        <label for="estado">Estado:</label>
                        <select id="estado" name="estado">
                    <option value="pendiente">Pendiente</option>
                    <option value="finalizada">Finalizada</option>
                    <option value="rechazada">Rechazada</option>
                </select>
                    </div>
                    <div class="form-grupo">
                        <label for="prioridad">Prioridad:</label>
                        <select id="prioridad" name="prioridad">
                    <option value="baja">Baja</option>
                    <option value="media">Media</option>
                    <option value="alta">Alta</option>
                </select>
                    </div>


                    <!-- el solicitante se autocompleta cuando se crea el ticket-->
                    <div class="form-grupo">
                        <label for="solicitante-display">Solicitante:</label>
                        <input type="text" id="solicitante-display" readonly placeholder="Cargando...">
                        <input type="hidden" id="solicitante" name="solicitante" value="">
                    </div>

                    <!-- en el caso del usuario admin, el responsable se elije de un dropdown que viene del backend-->
                    <div class="form-grupo">
                        <label for="responsable">Responsable:</label>
                        <select id="responsable" name="responsable">
                    <option value="">— Seleccionar técnico —</option>
                                 <!-- acá va el backend -->
                    </select>
                        <p class="error-mensaje" id="error-responsable"></p>
                    </div>
                    <div class="form-grupo">
                        <label for="salon">Salon</label>
                        <select name="salon" id="salon">
                    <option value="">Elija una opción</option>
                    <option value="lab-1">Laboratorio 1</option>
                    <option value="lab-2">Laboratorio 2</option>
                    <option value="lab-3">Laboratorio 3</option>
                    <option value="lab-4">Laboratorio 4</option>
                    <option value="lab-5">Laboratorio 5</option>
                    <option value="tal-1">Taller 1</option>
                    <option value="tal-2">Taller 2</option>
                    <option value="tal-3">Taller 3</option>
                </select>
                    </div>

                    <div class="form-grupo">
                        <label for="equipo">Equipo</label>
                        <select name="equipo" id="equipo">
                    <option value="">Elija una opción</option>
                    <option value="equipo-1">Equipo 1</option>
                    <option value="equipo-2">Equipo 2</option>
                    <option value="equipo-3">Equipo 3</option>
                    <option value="equipo-4">Equipo 4</option>
                    <option value="equipo-5">Equipo 5</option>
                    </select>
                    </div>

                    <div class="form-grupo">
                        <label for="motivo">Motivo</label>
                        <textarea name="motivo" id="motivo" rows="5" placeholder="Escriba el motivo..." required></textarea>
                    </div>

                    <button type="submit" id="btn-enviar">Enviar</button>

                </form>
            </div>
        </main>
    </div>
    <script src="../../js/mesa-de-ayuda/detalle-ticket.js"></script>
</body>

</html>
