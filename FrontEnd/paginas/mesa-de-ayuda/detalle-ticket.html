    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="mesa-de-ayuda.css">
    <title>Mesa de Ayuda</title>
</head>
<body>
    <div class="container">
    
        <nav class="sidebar">
            <ul>
                <li class="sidebar-item"><a href="../dashboard/dashboard.html">Dashboard</a></li>
                <li class="sidebar-item"><a href="../uso-sala/planilla-uso-sala.html">Sala de informatica</a></li>
                <li class="sidebar-item"><a href="../inventario/inventario.html">Inventario</a></li>

                <li class="sidebar-item"><a href="../solicitudes/solicitudes.html">Solicitudes</a></li>
                <li class="sidebar-item"><a href="../usuarios/usuarios.html">Usuarios</a></li>
            </ul>
        </nav>
    
        <main class="main">
    
            <nav class="topbar-nav">
                <ul>
                    <li class="topbar-item"><a href="mesa-de-ayuda.html">Historial de tickets</a></li>
                    <li class="topbar-item activo">Nuevo ticket</li>
                </ul>
                <div class="topbar-logo">
                    <img src="../../img/logo.png" alt="Logo SGRSI">
                    <span>SGRSI</span>
                </div>
            </nav>


            <h1>EDICIÓN DE TICKET</h1>
            <form action="" method="post">
            <div class="campo">
            <label for="fecha">Fecha</label>
            <input type="text" id="fecha" name="fecha" placeholder="DD/MM/AAAA" required>
            </div>
            <div class="campo">
            <label for="hora-entrada">hora entrada</label>
            <input type="text" id="hora-entrada" name="hora-entrada" placeholder="Ej:18:30" required>
            </div>
            <div class="campo">
            <label for="hora-salida">Hora salida</label>
            <input type="text" id="hora-salida" name="hora-salida" placeholder="Ej:21:05" required>
            </div>
            
             <div class="campo">
                <label for="salon">Salon</label>
            <select name="salon" id="salon">
                <option value="">Elija una opción</option>
                <option value="lab-1">Laboratorio 1</option>
                <option value="lab-2">Laboratorio 2</option>
                <option value="lab-3">Laboratorio 3</option>
                <option value="lab-4">Laboratorio 4</option>
                <option value="lab-5">Laboratorio 5</option>
                <option value="tal-1">Taller 1</option>
                <option value="tal-2">Taller 2</option>
                <option value="tal-3">Taller 3</option>
            </select>
            </div>
            <div id="campo-unido">
            <label for="num-equipo">N° de equipo</label>
            <label for="dato-alumno">Nombre y apellido</label>
            <label for="estado">Estado del equipo</label>
            </div>
            
            <div id="campo">
            <label for="num-equipo1">1</label>
            <input type="text" name="nombre-apellido-alumno" id="nom-ape" placeholder="nombre y apellido">
            <input type="text" name="estado-equipo" id="est-equipo" placeholder="estado del equipo">
            </div>
            
            <div id="campo">
            <label for="num-equipo1">2</label>
            <input type="text" name="nombre-apellido-alumno" id="nom-ape" placeholder="nombre y apellido">
            <input type="text" name="estado-equipo" id="est-equipo" placeholder="estado del equipo">
            </div>
            
            <div id="campo">
            <label for="num-equipo1">3</label>
            <input type="text" name="nombre-apellido-alumno" id="nom-ape" placeholder="nombre y apellido">
            <input type="text" name="estado-equipo" id="est-equipo" placeholder="estado del equipo">
            </div>
            
            <div class="campo">
            <label for="notas">Notas</label>
            <input type="text" name="notas" id="notas" placeholder="notas">
            </div>
            
            <button type="submit" id="btn-enviar">Enviar</button>

            </form>
        </main>
    </div>
</body>
</html>
