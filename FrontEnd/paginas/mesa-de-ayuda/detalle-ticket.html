<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="mesa-de-ayuda.css">
    <title>Mesa de Ayuda</title>
</head>
<body>
    <div class="container">
    
        <nav class="sidebar">
            <ul>
                <li class="sidebar-item"><a href="../dashboard/dashboard.html">Dashboard</a></li>
                <li class="sidebar-item"><a href="../uso-sala/planilla-uso-sala.html">Sala de informatica</a></li>
                <li class="sidebar-item"><a href="../inventario/inventario.html">Inventario</a></li>
                <li class="sidebar-item activo">Mesa de Ayuda</li>
                <li class="sidebar-item"><a href="../solicitudes/solicitudes.html">Solicitudes</a></li>
                <li class="sidebar-item"><a href="../usuarios/usuarios.html">Usuarios</a></li>
            </ul>
        </nav>
    
        <main class="main">
    
            <nav class="topbar-nav">
                <ul>
                    <li class="topbar-item activo">Historial de tickets</li>
                    <li class="topbar-item"><a href="nuevo-ticket.html">Nuevo ticket</a></li>
                </ul>
                <div class="topbar-logo">
                    <img src="../../img/logo.png" alt="Logo SGRSI">
                    <span>SGRSI</span>
                </div>
            </nav>

            <h1>PLANILLA DE REGISTRO DE USO DE LA SALA DE INFORMÁTICA</h1>
            <form action="" method="post">
            <label for="fecha">Fecha</label>
            <input type="text" id="fecha" name="fecha" placeholder="DD/MM/AAAA" required>
            <label for="hora-entrada">hora entrada</label>
            <input type="text" id="hora-entrada" name="hora-entrada" placeholder="Ej:18:30" required>
            <label for="hora-salida">Hora salida</label>
            <input type="text" id="hora-salida" name="hora-salida" placeholder="Ej:21:05" required>
            <br>
            <fieldset>
                <legend>Salón</legend>
                <div class="opt-salon">
                    <input type="radio" id="lab-1" name="salon" value="laboratorio 1">
                    <label for="lab-1">Laboratorio 1</label>
                </div>
                <div class="opt-salon">
                    <input type="radio" id="lab-2" name="salon" value="laboratorio 2">
                    <label for="lab-2">Laboratorio 2</label>
                </div>
                <div class="opt-salon">
                    <input type="radio" id="lab-3" name="salon" value="laboratorio 3">
                    <label for="lab-3">Laboratorio 3</label>
                </div>
                <div class="opt-salon">
                    <input type="radio" id="lab-4" name="salon" value="labratorio 4">
                    <label for="lab-4">Laboratorio 4</label>
                </div>
                <div>
                    <input type="radio" id="lab-5" name="salon" value="laboratorio 5">
                    <label for="lab-5">Laboratorio 5</label>
                </div>
                <div>
                    <input type="radio" id="tal-1" name="salon" value="taller 1">
                    <label for="tal-1">Taller 1</label>
                </div>
                <div>
                    <input type="radio" id="tal-2" name="salon" value="taller 2">
                    <label for="tal-2">Taller 2</label>
                </div>
                <div>
                    <input type="radio" id="tal-3" name="salon" value="taller 3">
                    <label for="tal-3">Taller 3</label>
                </div>
            </fieldset>

            <label for="num-equipo">N° de equipo</label>
            <label for="dato-alumno">Nombre y apellido</label>
            <label for="estado">Estado del equipo</label>
            <br>
            <label for="num-equipo1">1</label>
            <input type="text" name="nombre-apellido-alumno" id="nom-ape" value="nombre y apellido">
            <input type="text" name="estado-equipo" id="est-equipo" value="estado del equipo">
            <br>

            <label for="notas">Notas</label>
            <input type="text" name="notas" id="notas" value="notas">
            <br>
            <button type="submit">Enviar</button>

            </form>

        </main>
    </div>
</body>
</html>
