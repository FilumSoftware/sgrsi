<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="solicitudes.css">
    <title>Solicitudes</title>
</head>
<body>
    <div class="container">
    
        <nav class="sidebar">
            <ul>
                <li class="sidebar-item"><a href="../dashboard/dashboard.html">Dashboard</a></li>
                <li class="sidebar-item"><a href="../uso-sala/planilla-uso-sala.html">Sala de informatica</a></li>
                <li class="sidebar-item"><a href="../inventario/nuevo-equipo.html">Inventario</a></li>
                <li class="sidebar-item"><a href="../mesa-de-ayuda/nuevo-ticket.html">Mesa de Ayuda</a></li>
                <li class="sidebar-item activo">Solicitudes</li>
                <li class="sidebar-item"><a href="../usuarios/nuevo-usuario.html">Usuarios</a></li>
            </ul>
        </nav>
    
        <main class="main">
    
            <nav class="topbar-nav">
                <ul>
                    <li class="topbar-item activo">Nueva solicitud</li>
                    <li class="topbar-item"><a href="solicitudes.html">Listado solicitudes</a></li>
                </ul>
                <div class="topbar-logo">
                    <img src="../../img/logo.png" alt="Logo SGRSI">
                    <span>SGRSI</span>
                </div>
            </nav>

                <div class="form-container">
                <form>
                    <fieldset>
                    <div class="form-grupo">
                        <label for="fecha">Fecha:</label>
                        <input type="date" id="fecha" name="fecha">
                    </div>
                    <div class="form-grupo">
                        <label for="salon">Salón:</label>
                        <select id="salon" name="salon">
                            <option value="laboratorio-1">Laboratorio 1</option>
                            <option value="laboratorio-2">Laboratorio 2</option>
                            <option value="laboratorio-3">Laboratorio 3</option>
                            <option value="laboratorio-4">Laboratorio 4</option>
                            <option value="laboratorio-5">Laboratorio 5</option>
                            <option value="laboratorio-6">Laboratorio 6</option>
                            <option value="taller-1">Taller 1</option>
                            <option value="taller-2">Taller 2</option>
                            <option value="taller-3">Taller 3</option>
                            <option value="deposito">Depósito</option>
                        </select>
                    </div>
                    <div class="form-grupo">
                        <label for="motivo">Motivo:</label><br>
                        <textarea id="motivo" name="motivo" rows="4" cols="50"></textarea><br><br>
                    </div>    

                <input type="submit" value="Enviar solicitud">
              </fieldset>
            </form>
            </div>

        </main>
    </div>
    <script src="../../js/solicitudes.js"></script>
</body>
</html>
