<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGRSI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="inicio.css">
  </head>

  <body>
    <div class="pagina">

      <div class="login-box">

        <img src="../../img/logoFilumsinfondo.jpeg" alt="Filum Software" class="logo">

        <h2>Sistema de gestión de recursos y soporte de informática</h2>
        <p class="subtitulo">Ingresá tus datos para acceder al sistema</p>

        <!-- Roles -->
        <div class="roles">
          <button class="rol">Solicitante</button>
          <button class="rol">Técnico</button>
          <button class="rol activo">Administrador</button>
        </div>

    
        <form action="../dashboard/dashboard.html" method="get">
          <label>Correo electrónico</label>
          <input type="email" placeholder="usuario@iti.edu.uy">

          <label>Contraseña</label>
          <input type="password" placeholder="••••••••">

          <button type="submit" class="btn-ingresar">Iniciar sesión</button>
        </form>

        <p class="crear-cuenta">¿No tenés cuenta? <a href="#">Registrate acá</a></p>

      </div>

      <p class="pie">SGRSI v2.0 — FILUM SOFTWARE © 2026</p>

    </div>
  </body>
</html>
