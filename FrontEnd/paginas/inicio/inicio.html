    <div class="login-box">
  <h2>Sistema de gestión de recursos y soporte de informática</h2>

  <!-- Selector de rol -->
<div class="roles">
  <button class="rol">Solicitante</button>
  <button class="rol">Técnico</button>
  <button class="rol activo">Administrador</button>
</div>

  <form action="../dashboard/dashboard.html" method="get">
    <label>Correo electrónico</label>
    <input type="email" placeholder="usuario@iti.edu.uy">

    <label>Contraseña</label>
    <input type="password" placeholder="••••••••">

    <button type="submit">Iniciar sesión</button>
    
  </form>

  <p>¿No tenés cuenta? <a href="#">Registrate acá</a></p>
